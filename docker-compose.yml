services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "15MB"

  api1:
    image: israelbaruque/rinha-2026:latest
    environment:
      - PORT=8080
      - VECTOR_SERVICE_URL=http://vector-service:8090
    depends_on:
      - vector-service
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "25MB"

  api2:
    image: israelbaruque/rinha-2026:latest
    environment:
      - PORT=8080
      - VECTOR_SERVICE_URL=http://vector-service:8090
    depends_on:
      - vector-service
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "25MB"

  vector-service:
    image: israelbaruque/rinha-2026-vector:latest
    volumes:
      - ./resources:/app/resources:ro
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "285MB"