services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "10MB"

  api1:
    image: israelbaruque/rinha-2026:latest
    environment:
      - PORT=8080
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170MB"

  api2:
    image: israelbaruque/rinha-2026:latest
    environment:
      - PORT=8080
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170MB"